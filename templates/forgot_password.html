<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password • EVOSGPT</title>
  <style>
    body { font-family: system-ui; background: #0f1115; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1a1d23; padding: 24px; border-radius: 12px; width: 100%; max-width: 400px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
    button { width: 100%; padding: 10px; border-radius: 8px; background: #ff4d4d; border: none; font-weight: bold; cursor: pointer; color: #000; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Forgot Password</h2>
    <p>Enter your email to reset your password.</p>
    <form id="forgotForm">
      <input type="email" id="email" placeholder="Your email" required>
      <button type="submit">Send Reset Link</button>
    </form>
    <p id="message"></p>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const emailInput = document.getElementById('email');
    const msg = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      const email = emailInput.value.trim();
      if (!email) return;

      try {
        const res = await fetch('/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        msg.textContent = data.message || data.error;
      } catch (err) {
        msg.textContent = '⚠️ Something went wrong.';
      }
    });
  </script>
</body>
</html>
