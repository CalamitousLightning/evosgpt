<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password • EVOSGPT</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui;
      background: #0f1115;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1a1d23;
      padding: 28px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      background: #ff4d4d;
      border: none;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Reset Password</h2>

    <form id="resetForm">
      <input type="password" id="password" placeholder="New password" required>
      <button type="submit">Update Password</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://ttcavdmgylcxmzdijcsx.supabase.coL",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0Y2F2ZG1neWxjeG16ZGlqY3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY5MzkxODUsImV4cCI6MjA3MjUxNTE4NX0.EWYFvDd0GEyCaR_lArtaHtN9aYm8O01LeAGjP7KqQXQ"
    );

    const message = document.getElementById("message");

    // Extract tokens from URL hash
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    const access_token = params.get("access_token");
    const refresh_token = params.get("refresh_token");

    async function setSession() {
      if (access_token && refresh_token) {
        await supabase.auth.setSession({
          access_token: access_token,
          refresh_token: refresh_token
        });
      } else {
        message.textContent = "Invalid or expired reset link.";
      }
    }

    setSession();

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;

      if (password.length < 6) {
        message.textContent = "Password must be at least 6 characters.";
        return;
      }

      const { error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        message.textContent = "Error updating password.";
      } else {
        message.textContent = "Password updated successfully! Redirecting...";
        setTimeout(() => {
          window.location.href = "/login";
        }, 2000);
      }
    });
  </script>

</body>
</html>
